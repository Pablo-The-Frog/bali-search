<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PATHETIQUE</title>
    <style>
        body {
            background-color: black;
            color: red;
            font-family: monospace;
            text-align: center;
            padding: 10%;
            animation: shake 0.2s infinite;
            overflow: hidden;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        .insult {
            font-size: 28px;
            margin-bottom: 30px;
            height: 60px;
        }

        .timer {
            font-size: 20px;
            color: orange;
            margin-bottom: 30px;
            white-space: pre-line; /* Permet d'afficher les sauts de ligne */
        }

        button {
            padding: 15px;
            margin: 10px;
            font-size: 18px;
            background-color: darkred;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: red;
        }
    </style>
</head>
<body>

<h1>STOP.</h1>

<div class="insult" id="insult">Chargement de ton échec...</div>

<div class="timer" id="timer"></div>

<button onclick="goToMath()">Retourne faire des maths</button>
<button onclick="goToPhysics()">Retourne faire de la physique</button>

<script>
    const insults = [
        "Bravo. Encore une fois, tu choisis la facilité.",
        "Tu crois vraiment que regarder une vidéo va t'aider ?",
        "Ton toi du futur est en train de perdre contre quelqu’un de plus discipliné.",
        "Tu veux ENS ? Regarde-toi.",
        "Chaque seconde ici = un mec qui te dépasse.",
        "Tu fuis. Encore.",
        "Pathétique.",
        "Tu sais EXACTEMENT ce que tu devrais faire.",
        "Et pourtant t’es là.",
        "Ferme cette page et va devenir dangereux."
    ];

    function randomInsult() {
        const random = insults[Math.floor(Math.random() * insults.length)];
        document.getElementById("insult").innerText = random;
    }

    // GESTION DU TEMPS ET DES STATS
    let sessionSeconds = 0;
    let total = parseInt(localStorage.getItem("totalTime")) || 0;
    let record = parseInt(localStorage.getItem("recordTime")) || 0;
    let visits = parseInt(localStorage.getItem("visits")) || 0;

    visits++;
    localStorage.setItem("visits", visits);

    function updateTimer() {
        sessionSeconds++;
        total++;

        localStorage.setItem("totalTime", total);

        if (sessionSeconds > record) {
            record = sessionSeconds;
            localStorage.setItem("recordTime", record);
        }

        let message = `Temps perdu (session) : ${sessionSeconds}s\n`;
        message += `Temps perdu (total) : ${total}s\n`;
        message += `Record de honte : ${record}s`;

        if (sessionSeconds > 30 && sessionSeconds <= 60) {
            message += "\n\nÇa commence à faire beaucoup là...";
        } else if (sessionSeconds > 60 && sessionSeconds <= 120) {
            message += "\n\nSérieusement ? Tu es en train de perdre ta journée.";
        } else if (sessionSeconds > 120) {
            message += "\n\nTu te sabotes volontairement. C'est lamentable.";
        }

        document.getElementById("timer").innerText = message;
    }

    // FONCTIONS DE REDIRECTION
    function goToMath() {
        window.location.href = "https://colasbd.github.io/cdc/cahier_de_calcul_v1.3.2.pdf";
    }

    function goToPhysics() {
        // Lien vers un site de physique (ex: ressources CPGE)
        window.location.href = "https://prepas.org/?physique";
    }

    // BOUTON DE SORTIE (optionnel)
    function fakeButton() {
        alert("Non. Tu ne mérites pas de partir comme ça.");
    }

    // LANCEURS
    setInterval(randomInsult, 3000);
    setInterval(updateTimer, 1000);
    randomInsult(); // Lancer tout de suite

    // EFFET VISUEL PIRE
    setInterval(() => {
        document.body.style.backgroundColor = `rgb(${Math.random() * 50}, 0, 0)`;
    }, 500);

    // AUDIO (avec déblocage au premier clic)
    const audio = new Audio("https://www.soundjay.com/button/beep-10.mp3");
    audio.loop = true;
    
    document.body.addEventListener('click', () => {
        audio.play().catch(e => console.log("Audio en attente..."));
    }, { once: true });

    // BLOQUER RETOUR ARRIÈRE
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
        history.go(1);
    };
</script>

</body>
</html>
