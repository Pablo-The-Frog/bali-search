<script>
const insults = [
"Bravo. Encore une fois, tu choisis la facilité.",
"Tu crois vraiment que regarder une vidéo va t'aider ?",
"Ton toi du futur est en train de perdre contre quelqu’un de plus discipliné.",
"Tu veux ENS ? Regarde-toi.",
"Chaque seconde ici = un mec qui te dépasse.",
"Tu fuis. Encore.",
"Pathétique.",
"Tu sais EXACTEMENT ce que tu devrais faire.",
"Et pourtant t’es là.",
"Ferme cette page et va devenir dangereux."
];

function randomInsult() {
    const random = insults[Math.floor(Math.random() * insults.length)];
    document.getElementById("insult").innerText = random;
}

// TIMER + culpabilité exponentielle
let seconds = 0;

function updateTimer() {
    seconds++;

    let message = "Temps perdu : " + seconds + "s";

    if (seconds > 30) {
        message += " | Ça commence à faire beaucoup là...";
    }
    if (seconds > 60) {
        message += " | Sérieusement ?";
    }
    if (seconds > 120) {
        message += " | Tu te sabotes volontairement.";
    }

    document.getElementById("timer").innerText = message;
}

// FAUX BOUTON
function fakeButton() {
    alert("Non. Tu ne mérites pas de partir comme ça.");
}

// VRAI BOUTON (retardé)
function goToWork() {
    window.location.href = "https://colasbd.github.io/cdc/cahier_de_calcul_v1.3.2.pdf";
}

// CHANGEMENT DE TEXTE CONSTANT
setInterval(randomInsult, 3000);
setInterval(updateTimer, 1000);

// ÉCRAN QUI DEVIENT PIRE
setInterval(() => {
    document.body.style.backgroundColor =
        `rgb(${Math.random()*50},0,0)`;
}, 500);

// BLOQUER RETOUR ARRIÈRE
history.pushState(null, null, location.href);
window.onpopstate = function () {
    history.go(1);
};

// SON HUMILIANT LOOP
const audio = new Audio("https://www.soundjay.com/button/beep-10.mp3");
audio.loop = true;
audio.play();
</script>
